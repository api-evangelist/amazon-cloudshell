naftiko: "1.0.0-alpha1"

info:
  label: "Amazon CloudShell Cloud Shell Environment Management"
  description: "Workflow for cloud shell environment management using Amazon CloudShell for Cloud Administrator personas."
  tags:
    - Amazon Web Services
    - Amazon CloudShell
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - import: cloudshell
      location: ./shared/cloudshell.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: cloudshell-workflow-api
      description: "Unified REST API for Amazon CloudShell cloud shell environment management."
      resources: []

    - type: mcp
      port: 9090
      namespace: cloudshell-workflow-mcp
      transport: http
      description: "MCP server for AI-assisted Amazon CloudShell cloud shell environment management."
      tools: []
