naftiko: "1.0.0-alpha1"

info:
  label: "Amazon CloudShell"
  description: "API for creating and managing CloudShell environments — browser-based terminal sessions for AWS resource management."
  tags:
    - Amazon Web Services
    - Amazon CloudShell
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: cloudshell
      baseUri: https://cloudshell.us-east-1.amazonaws.com
      description: "Amazon CloudShell API."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources: []

  exposes:
    - type: rest
      port: 8100
      namespace: cloudshell-rest
      resources: []

    - type: mcp
      port: 9100
      namespace: cloudshell-mcp
      transport: http
      tools: []
