aid: amazon-cloudshell
name: Amazon CloudShell
description: >-
  AWS CloudShell is a browser-based terminal that enables users to manage and explore AWS resources directly from the AWS Management Console. Pre-authenticated, pre-installed with AWS CLI and dev tools,
  with 1 GB of persistent storage per region.
